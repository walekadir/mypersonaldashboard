<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jid's Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <header>
    <div class="avatar-wrap">
      <img src="https://media.licdn.com/dms/image/v2/D4E03AQFCmn-OEMQYcA/profile-displayphoto-crop_800_800/B4EZ1aQz7_IEAI-/0/1775335853855?e=1776902400&v=beta&t=vYXvM9-6InZFOmHqfnbkxIFY3dwC__E45p-aRWq8xoA" alt="Jid">
      <div class="avatar-status"></div>
    </div>
    <div class="header-text">
      <h1 id="greeting">Good Morning, Jid</h1>
      <div class="header-meta">
        <span>📍 Ilorin, Nigeria</span>
        <span class="sep">·</span>
        <span id="clock">00:00:00</span>
        <span class="sep">·</span>
        <span class="live-dot">Live</span>
      </div>
    </div>
    <div class="header-brand">SWIIISH.X</div>
  </header>

  <div class="dashboard-grid">

    <div class="card">
      <div class="card-label"><span class="dot"></span> Naira Exchange
        <span id="fx-timestamp" style="margin-left:auto;font-size:0.6rem;opacity:0.5;font-family:'DM Mono',monospace"></span>
      </div>
      <div id="fx-list">
        <div class="row"><span>USD / NGN</span><strong class="fx-value" id="usd-ngn">...</strong></div>
        <div class="row"><span>GBP / NGN</span><strong class="fx-value" id="gbp-ngn">...</strong></div>
        <div class="row"><span>EUR / NGN</span><strong class="fx-value" id="eur-ngn">...</strong></div>
      </div>
    </div>

    <div class="card">
      <div class="card-label"><span class="dot"></span> Market Watch <span class="live-dot" style="margin-left:auto">Live</span></div>
      <div id="crypto-list">
        <div class="skeleton" style="width:100%"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-label"><span class="dot"></span> Nigeria Weather</div>
      <div id="weather-list">
        <div class="skeleton" style="width:100%"></div>
      </div>
    </div>

    <div class="card card-hero">
      <div class="hero-inner">
        <div class="hero-left">
          <div class="card-label"><span class="dot"></span> Next Man City Match</div>
          <div class="hero-fixture">Man City <span>vs</span> Chelsea</div>
          <div class="hero-meta">Premier League · Sun Apr 12 · 4:30 PM WAT</div>
        </div>
        <div class="hero-right">
          <div class="countdown-label">Kick-off in</div>
          <div id="countdown">00d 00h 00m</div>
          <div class="countdown-unit" id="countdown-secs">00s remaining</div>
        </div>
      </div>
    </div>

    <div class="card tools-card" style="grid-column: span 3;">
      <div class="card-label"><span class="dot"></span> My Tools</div>
      <div class="tools-tabs">
        <button class="tool-tab active" onclick="showTool('calculator', this)">⚙ Fee Calc</button>
        <button class="tool-tab" onclick="showTool('game', this)">🎮 Dodger</button>
        <button class="tool-tab" onclick="showTool('decode', this)">📈 Fintech 2026</button>
      </div>
      <div class="tool-frame-wrap">
        <iframe id="tool-calculator" class="tool-frame active-frame" src="https://jidspaymentfeecalcv4.vercel.app" title="Fee Calculator"></iframe>
        <iframe id="tool-game" class="tool-frame" src="https://jidsdodgergame.vercel.app/" title="Game"></iframe>
        <iframe id="tool-decode" class="tool-frame" src="./decode.html" title="Fintech Report"></iframe>
      </div>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Jid's Nigerian Fintech Landscape 2026 — DECODE</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;
  --surface:#0f0f0f;
  --surface2:#161616;
  --border:#242424;
  --text:#f0ede6;
  --muted:#5a5a5a;
  --orange:#f97316;
  --green:#22c55e;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Mono',monospace;
  padding: 20px;
}

.landscape-grid{ display:grid; grid-template-columns:1fr 1fr; gap:24px; }
.landscape-card{ background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:28px; }
.bar-section-title{ font-size:0.62rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--muted); margin-bottom:20px; }

/* Simulator specific styles */
.sim-input-row { display:flex; justify-content:space-between; margin-bottom:10px; align-items: center; }
.sim-field { background:var(--surface2); border:1px solid var(--border); color:var(--text); text-align:right; border-radius:4px; padding: 5px; width: 100px; }

.reveal{opacity:0; transform:translateY(24px); transition:opacity 0.55s ease, transform 0.55s ease;}
.reveal.visible{opacity:1; transform:translateY(0);}
</style>
</head>
<body>

<section id="landscape">
  <h2 style="font-family:'Playfair Display'; font-size: 2rem; margin-bottom: 20px;">Fintech <em>Intelligence</em> 2026</h2>
  
  <div class="landscape-grid">
    <div class="landscape-card">
        <div class="bar-section-title">Market Maturity</div>
        <p style="font-size:0.8rem; color:var(--muted);">Projected growth and wealth accumulation within the Nigerian ecosystem by 2026.</p>
    </div>

    <div class="landscape-card" style="grid-column: span 2;">
        <div class="bar-section-title">2026 Wealth Path Simulator</div>
        <div style="display: flex; gap: 30px; flex-wrap: wrap; align-items: center;">
          <div style="flex: 1; min-width: 250px;">
            <div class="sim-input-row">
                <span style="font-size:0.75rem; color:var(--muted);">Monthly Deposit (₦)</span>
                <input type="number" id="sim-deposit" value="50000" class="sim-field">
            </div>
            <div class="sim-input-row">
                <span style="font-size:0.75rem; color:var(--muted);">Starting Balance (₦)</span>
                <input type="number" id="sim-initial" value="100000" class="sim-field">
            </div>
            <div class="sim-input-row">
                <span style="font-size:0.75rem; color:var(--muted);">Strategy</span>
                <select id="sim-strategy" class="sim-field">
                    <option value="0.15">Neobank (15%)</option>
                    <option value="0.12">Savings App (12%)</option>
                    <option value="0.04">Traditional Bank (4%)</option>
                </select>
            </div>
            <button onclick="calculateSavings()" style="width:100%; padding:12px; background:var(--orange); color:black; border:none; border-radius:6px; font-family:'Bebas Neue'; cursor:pointer; font-size:1.1rem; margin-top: 10px;">Calculate Path</button>
          </div>
          <div style="flex: 1; text-align:center;">
              <div style="font-size:0.65rem; color:var(--muted); text-transform:uppercase; letter-spacing:2px;">Est. Balance Dec 2026</div>
              <div id="sim-total" style="font-family:'Bebas Neue'; font-size:3.5rem; color:var(--orange);">₦0.00</div>
              <div id="sim-interest-earned" style="font-size:0.75rem; color:var(--green);">+ ₦0.00 interest earned</div>
          </div>
        </div>
    </div>
  </div>
</section>

<script>
function calculateSavings() {
    const P = parseFloat(document.getElementById('sim-initial').value) || 0;
    const PMT = parseFloat(document.getElementById('sim-deposit').value) || 0;
    const r = parseFloat(document.getElementById('sim-strategy').value);
    const n = 12; 
    const t = 0.66; // Time until Dec 2026

    const futurePrincipal = P * Math.pow((1 + r/n), (n * t));
    const futureAnnuity = PMT * ((Math.pow((1 + r/n), (n * t)) - 1) / (r/n));
    const totalWealth = futurePrincipal + futureAnnuity;
    const interestEarned = totalWealth - (P + (PMT * (n * t)));

    document.getElementById('sim-total').innerText = "₦" + totalWealth.toLocaleString(undefined, {maximumFractionDigits: 0});
    document.getElementById('sim-interest-earned').innerText = "+ ₦" + interestEarned.toLocaleString(undefined, {maximumFractionDigits: 0}) + " interest earned";
}

document.addEventListener('DOMContentLoaded', () => {
    calculateSavings(); // Initialize the numbers on load
});
</script>
</body>
</html>
